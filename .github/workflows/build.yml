name: CI Build RisingWorld Plugin

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Set up JDK 20
              uses: actions/setup-java@v3
              with:
                  distribution: temurin
                  java-version: 20

            - name: Download DepotDownloader binary
              shell: pwsh
              run: |
                  $url = "https://github.com/SteamRE/DepotDownloader/releases/download/DepotDownloader_3.4.0/DepotDownloader-windows-x64.zip"
                  $zipPath = "$env:USERPROFILE\DepotDownloader.zip"
                  $installDir = "$env:USERPROFILE\DepotDownloader"

                  Invoke-WebRequest -Uri $url -OutFile $zipPath

                  # Extract
                  Expand-Archive -Path $zipPath -DestinationPath $installDir -Force
                  $ddExe = Join-Path $installDir "DepotDownloader.exe"

                  if (-not (Test-Path $ddExe)) {
                  Write-Error "❌ DepotDownloader.exe not found after extraction"
                  exit 1
                  }
                  Write-Host "✅ DepotDownloader ready at $ddExe"

            - name: Download Rising World Dedicated Server (anonymous)
              shell: pwsh
              run: |
                  $ddExe = "$env:USERPROFILE\DepotDownloader\DepotDownloader.exe"
                  $appId = 339010
                  $depotId = 339012
                  $branch = "public"
                  $outputDir = "$env:USERPROFILE\RisingWorldDedicatedServer"

                  # Remove old folder if exists
                  if (Test-Path $outputDir) {
                      Remove-Item $outputDir -Recurse -Force
                  }

                  Write-Host "Downloading Rising World Dedicated Server..."
                  & $ddExe -app $appId -depot $depotId -branch $branch -dir $outputDir -anonymous

                  # Check if PluginAPI.jar exists
                  $pluginApiPath = Join-Path $outputDir "Data\Java\PluginAPI.jar"
                  if (-not (Test-Path $pluginApiPath)) {
                      Write-Error "PluginAPI.jar not found at $pluginApiPath"
                      exit 1
                  }

                  Write-Host "✅ Found PluginAPI.jar at $pluginApiPath"

                  # Set environment variable for next steps
                  echo "RISINGWORLD_PLUGINAPI_PATH=$pluginApiPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8

            - name: Build project
              shell: pwsh
              run: "& gradlew.bat clean build"

            - name: Zip dist contents
              shell: pwsh
              run: |
                  $distPath = "dist"
                  if (-not (Test-Path $distPath)) {
                    Write-Error "❌ dist folder not found!"
                    exit 1
                  }

                  $zipName = "RisingMachines-dist.zip"

                  # Get all subfolders inside dist
                  $items = Get-ChildItem -Path $distPath -Directory
                  if (-not $items) {
                    Write-Error "❌ No folders inside dist to zip!"
                    exit 1
                  }

                  # Zip the subfolders (contents only)
                  Compress-Archive -Path $items.FullName -DestinationPath $zipName -Force
                  Write-Host "✅ Created zip: $zipName"

                  echo "ZIP_PATH=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: RisingMachines-dist
                  path: ${{ env.ZIP_PATH }}
